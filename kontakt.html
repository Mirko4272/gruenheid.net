<body class="legal contact-page-body">

<div class="background"></div>
<div class="overlay"></div>

<main class="legal-page contact-page" aria-label="Kontakt">

    <section class="legal-header contact-header">
        <h1>Schreibe mir</h1>
        <p>Ich freue mich über deine Nachricht.</p>
    </section>

    <section class="legal-box contact-box">
        <form class="contact-form" action="https://formspree.io/f/xbdvzqzl" method="POST">
            <input type="hidden" name="_subject" value="Neue Nachricht über gruenheid.net">
            <input type="hidden" name="_next" value="https://www.gruenheid.net/danke.html">

            <label for="name">Name</label>
            <input id="name" name="name" type="text" autocomplete="name" required>

            <label for="email">E-Mail</label>
            <input id="email" name="email" type="email" autocomplete="email" required>

            <label for="message">Nachricht</label>
            <textarea id="message" name="message" rows="7" required></textarea>

            <button type="submit" class="form-button">Nachricht senden</button>
        </form>
    </section>

    <a class="legal-back" href="index.html">← Zur Startseite</a>

</main>
